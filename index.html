<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Diaries ✨</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="landing-body">

  <!-- Floating decorative stickers -->
  <div class="floaties" aria-hidden="true">
    <span style="top:8%;left:6%;font-size:2.5rem;animation-delay:0s">🌸</span>
    <span style="top:15%;right:8%;font-size:2rem;animation-delay:0.6s">⭐</span>
    <span style="top:55%;left:3%;font-size:1.8rem;animation-delay:1.2s">🦋</span>
    <span style="top:70%;right:5%;font-size:2.2rem;animation-delay:0.3s">🌈</span>
    <span style="top:40%;right:3%;font-size:1.6rem;animation-delay:0.9s">💫</span>
    <span style="top:82%;left:8%;font-size:1.9rem;animation-delay:1.5s">🌺</span>
    <span style="top:30%;left:2%;font-size:1.5rem;animation-delay:0.4s">🎀</span>
    <span style="top:90%;right:10%;font-size:2rem;animation-delay:1s">✨</span>
  </div>

  <div class="landing-center">

    <!-- Logo -->
    <div class="landing-logo">
      <div class="logo-icon">📖</div>
      <h1 class="logo-text">Digital Diaries</h1>
      <p class="logo-tagline">your memories, your way</p>
    </div>

    <!-- Hero text -->
    <div class="hero-text">
      <p>Create beautiful scrapbooks with photos, stickers, fonts & your own handwriting style. Keep your memories alive — forever.</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card" id="auth-card">

      <!-- Google Sign In -->
      <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6.1C12.5 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/><path fill="#FBBC05" d="M10.5 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.8-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8-6.2z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.7 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.8l-8 6.2C6.6 42.6 14.6 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <!-- Email/Password -->
      <div id="email-section">
        <div class="tab-row">
          <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="form-login">
          <input class="auth-input" type="email" id="login-email" placeholder="your@email.com">
          <input class="auth-input" type="password" id="login-password" placeholder="Password">
          <button class="btn-primary" onclick="signInWithEmail()">Sign In ✨</button>
          <button class="btn-link" onclick="forgotPassword()">Forgot password?</button>
        </div>

        <div id="form-signup" style="display:none">
          <input class="auth-input" type="text" id="signup-name" placeholder="Your name">
          <input class="auth-input" type="email" id="signup-email" placeholder="your@email.com">
          <input class="auth-input" type="password" id="signup-password" placeholder="Create a password (min 6 chars)">
          <button class="btn-primary" onclick="signUpWithEmail()">Create Account 🌸</button>
        </div>
      </div>

      <div class="auth-msg hidden" id="auth-msg"></div>

    </div>

    <!-- Features row -->
    <div class="features-row">
      <div class="feature-pill">📸 Upload photos</div>
      <div class="feature-pill">✏️ Custom fonts</div>
      <div class="feature-pill">🎨 Stickers</div>
      <div class="feature-pill">🌈 Page themes</div>
      <div class="feature-pill">☁️ Auto-saved</div>
    </div>

  </div>

  <script src="auth.js"></script>
</body>
</html>
